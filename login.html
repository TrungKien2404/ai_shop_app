<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng Nhập - Shoe Store</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- Header -->
  <div class="bg-blue-800 text-white p-4 flex justify-between items-center">
    <a href="index.html" class="font-bold text-lg hover:text-gray-200">MyShoes</a>
    <div class="space-x-4">
      <a href="nike.html">Nike</a>
      <a href="adidas.html">Adidas</a>
      <a href="puma.html">Puma</a>
      <a href="sale.html" class="text-red-300">SALE</a>
    </div>
    <div class="flex items-center space-x-4">
      <a href="cart.html" class="cursor-pointer">🛒</a>
      <div class="relative">
        <i onclick="toggleUserMenu()" class="fa-solid fa-user text-xl cursor-pointer"></i>
        <div id="userMenu" class="hidden absolute right-0 mt-2 w-32 bg-white text-black rounded-lg shadow-lg">
          <a href="login.html" class="block px-4 py-2 hover:bg-gray-100">Đăng nhập</a>
          <a href="signup.html" class="block px-4 py-2 hover:bg-gray-100">Đăng ký</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Login Form -->
  <div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
      <h1 class="text-3xl font-bold mb-6 text-center">Đăng Nhập</h1>
      
      <form class="space-y-4" id="loginForm">
        <div>
          <label class="block text-sm font-medium mb-2">Email</label>
          <input type="email" placeholder="Nhập email của bạn" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
        </div>
        
        <div>
          <label class="block text-sm font-medium mb-2">Mật khẩu</label>
          <input type="password" placeholder="Nhập mật khẩu" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600">
        </div>
        
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700">Đăng Nhập</button>
      </form>
      
      <p class="text-center mt-4">Chưa có tài khoản? <a href="signup.html" class="text-blue-600 font-bold hover:underline">Đăng ký ngay</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
