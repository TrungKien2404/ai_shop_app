<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Adidas - Shoe Store</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <!-- Header -->
  <div class="bg-blue-800 text-white p-4 flex justify-between items-center">
    <a href="index.html" class="font-bold text-lg hover:text-gray-200">MyShoes</a>
    <div class="space-x-4">
      <a href="nike.html">Nike</a>
      <a href="adidas.html" class="underline">Adidas</a>
      <a href="puma.html">Puma</a>
      <a href="sale.html" class="text-red-300">SALE</a>
    </div>
    <div class="flex items-center space-x-4">
      <a href="cart.html" class="cursor-pointer">🛒</a>
      <div class="relative">
        <i onclick="toggleUserMenu()" class="fa-solid fa-user text-xl cursor-pointer"></i>
        <div id="userMenu" class="hidden absolute right-0 mt-2 w-32 bg-white text-black rounded-lg shadow-lg">
          <a href="login.html" class="block px-4 py-2 hover:bg-gray-100">Đăng nhập</a>
          <a href="signup.html" class="block px-4 py-2 hover:bg-gray-100">Đăng ký</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Products -->
  <h2 class="text-center text-2xl font-bold my-6">👟 ADIDAS</h2>
  
  <div class="grid grid-cols-5 gap-4 px-6 mb-6">
    <div class="bg-white p-3 rounded-xl shadow product-card">
      <img src="images/Adidas/Giày Atlanta_2500000.jpg" class="w-full h-32 object-cover">
      <h3 class="mt-2 font-semibold text-sm">Adidas Ultraboost 23</h3>
      <p class="text-red-500 font-bold">3.890.000đ</p>
      <button class="w-full bg-blue-600 text-white py-1 text-sm mt-2 rounded hover:bg-blue-700">Thêm vào giỏ</button>
    </div>

    <div class="bg-white p-3 rounded-xl shadow product-card">
      <img src="https://assets.adidas.com/images/h_840,f_auto,fl_lossy,q_auto,w_840,c_limit/8ef21224b82c438fa321af7f009e3e47_9366/NMD_R1_Shoes_Black_IE7444_01_standard.jpg" class="w-full h-32 object-cover">
      <h3 class="mt-2 font-semibold text-sm">Adidas NMD R1</h3>
      <p class="text-red-500 font-bold">3.290.000đ</p>
      <button class="w-full bg-blue-600 text-white py-1 text-sm mt-2 rounded hover:bg-blue-700">Thêm vào giỏ</button>
    </div>

    <div class="bg-white p-3 rounded-xl shadow product-card">
      <img src="https://assets.adidas.com/images/h_840,f_auto,fl_lossy,q_auto,w_840,c_limit/17854c32c1f54a969a1aad000c5e7201_9366/Stan_Smith_Shoes_White_M20325_01_standard.jpg" class="w-full h-32 object-cover">
      <h3 class="mt-2 font-semibold text-sm">Adidas Stan Smith</h3>
      <p class="text-red-500 font-bold">2.690.000đ</p>
      <button class="w-full bg-blue-600 text-white py-1 text-sm mt-2 rounded hover:bg-blue-700">Thêm vào giỏ</button>
    </div>

    <div class="bg-white p-3 rounded-xl shadow product-card">
      <img src="https://assets.adidas.com/images/h_840,f_auto,fl_lossy,q_auto,w_840,c_limit/8fd76ebb73a941a491b4af7e00849011_9366/ZX_500_Shoes_Black_IE6756_01_standard.jpg" class="w-full h-32 object-cover">
      <h3 class="mt-2 font-semibold text-sm">Adidas ZX 500</h3>
      <p class="text-red-500 font-bold">2.190.000đ</p>
      <button class="w-full bg-blue-600 text-white py-1 text-sm mt-2 rounded hover:bg-blue-700">Thêm vào giỏ</button>
    </div>

    <div class="bg-white p-3 rounded-xl shadow product-card">
      <img src="https://assets.adidas.com/images/h_840,f_auto,fl_lossy,q_auto,w_840,c_limit/d9c1e6f5d1c243fea1b2a1b3d8c5f0a4_9366/Forum_Low_Shoes_White_GY5976_01_standard.jpg" class="w-full h-32 object-cover">
      <h3 class="mt-2 font-semibold text-sm">Adidas Forum Low</h3>
      <p class="text-red-500 font-bold">2.890.000đ</p>
      <button class="w-full bg-blue-600 text-white py-1 text-sm mt-2 rounded hover:bg-blue-700">Thêm vào giỏ</button>
    </div>
  </div>

  <script>
    function toggleUserMenu() {
      const menu = document.getElementById('userMenu');
      menu.classList.toggle('hidden');
    }
  </script>
</body>
</html>
