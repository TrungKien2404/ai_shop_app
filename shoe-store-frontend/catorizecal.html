<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Categorize - Shoe Store</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/constants.js"></script>
</head>


<body>
  <!-- Navbar -->
  <div class="custom-navbar p-4 flex justify-between items-center relative z-50 shadow-sm">

    <!-- Logo (Góc trái) -->
    <a href="home.html" class="flex items-center gap-2">
      <img id="siteLogo" src="images/logo/lightmode.png" alt="Logo" class="h-10 w-auto">
    </a>

    <!-- Menu (Ở giữa) -->
    <div class="flex items-center space-x-8">
      <a href="home.html" class="hover:text-gray-300 font-semibold text-lg transition">Home</a>

      <!-- Dropdown Sản phẩm -->
      <div class="relative group">
        <button
          class="flex items-center gap-1 hover:text-gray-300 font-semibold text-lg focus:outline-none py-2 transition">
          Sản phẩm <i class="fa-solid fa-chevron-down text-xs ml-1"></i>
        </button>

        <!-- Khung lựa chọn sản phẩm (Hover để hiện) -->
        <div
          class="absolute left-0 mt-0 w-48 bg-white text-black rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 border border-gray-100">
          <div class="py-2">
            <a href="nike.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-nike.png" alt="Nike" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Nike</span>
            </a>
            <a href="adidas.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-adidas.png" alt="Adidas" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Adidas</span>
            </a>
            <a href="puma.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-puma.png" alt="Puma" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Puma</span>
            </a>
            <a href="bitis.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-bitis.png" alt="Biti's" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Biti's</span>
            </a>
            <a href="mizuno.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-mizuno.png" alt="Mizuno" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Mizuno</span>
            </a>
          </div>
        </div>
      </div>

      <a href="sale.html" class="text-red-400 hover:text-red-300 font-bold text-lg transition">SALE</a>
    </div>

    <!-- Right side (Góc phải) -->
    <div class="flex items-center space-x-6">

      <!-- Thanh tìm kiếm -->
      <div
        class="flex items-center bg-white rounded-full px-4 py-1.5 shadow-sm border border-gray-300 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
        <input type="text" placeholder="Tìm kiếm..."
          class="bg-transparent text-black outline-none w-32 md:w-56 text-sm placeholder-gray-500">
        <button class="focus:outline-none"><i
            class="fa-solid fa-search text-gray-500 hover:text-blue-600 transition"></i></button>
      </div>

      <!-- Cart -->
      <div class="relative">
        <a href="cart.html" class="cursor-pointer text-2xl hover:opacity-80 transition">
          🛒
          <span
            class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full font-bold shadow">
            2
          </span>
        </a>
      </div>


      <!-- Theme Toggle -->
      <div class="relative">
        <button onclick="toggleTheme()" class="cursor-pointer text-2xl hover:text-gray-300 transition focus:outline-none"
          title="Đổi giao diện">
          <i class="theme-icon fa-solid fa-moon"></i>
        </button>
      </div>

      <!-- User Icon -->
      <div class="relative group/user">
        <div onclick="toggleUserMenu()" class="cursor-pointer hover:text-gray-300 transition">
          <i class="fa-solid fa-user text-2xl"></i>
        </div>

        <!-- Dropdown User -->
        <div id="userMenu"
          class="hidden absolute right-0 mt-3 w-36 bg-white text-black rounded-lg shadow-xl border border-gray-100 py-1">
          <a href="login.html" class="block px-4 py-2 hover:bg-gray-100 transition font-medium">Đăng nhập</a>
          <a href="signup.html" class="block px-4 py-2 hover:bg-gray-100 transition font-medium">Đăng ký</a>
        </div>
      </div>

    </div>

  </div>

  <h2 class="text-center text-4xl font-extrabold my-12 tracking-tight text-gray-900 dark:text-white">PHÂN LOẠI SẢN PHẨM</h2>
  
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-10 md:px-20 mb-20">
    <!-- Giày bóng đá -->
    <a href="sport.html" class="group relative overflow-hidden rounded-3xl aspect-[4/5] shadow-2xl transition-all duration-500 hover:-translate-y-2">
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent z-10"></div>
      <img src="images/banners/sport_category.png" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Giày bóng đá">
      <div class="absolute inset-0 flex flex-col justify-end p-8 z-20">
        <h3 class="text-3xl font-bold text-white mb-2">GIÀY BÓNG ĐÁ</h3>
        <p class="text-gray-200 opacity-0 group-hover:opacity-100 transition-opacity duration-300">Chinh phục mọi sân cỏ</p>
      </div>
    </a>

    <!-- Giày chạy bộ -->
    <a href="running.html" class="group relative overflow-hidden rounded-3xl aspect-[4/5] shadow-2xl transition-all duration-500 hover:-translate-y-2">
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent z-10"></div>
      <img src="images/banners/running_category.png" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Giày chạy bộ">
      <div class="absolute inset-0 flex flex-col justify-end p-8 z-20">
        <h3 class="text-3xl font-bold text-white mb-2">GIÀY CHẠY BỘ</h3>
        <p class="text-gray-200 opacity-0 group-hover:opacity-100 transition-opacity duration-300">Bứt phá mọi giới hạn</p>
      </div>
    </a>

    <!-- Giày đi hằng ngày -->
    <a href="casual.html" class="group relative overflow-hidden rounded-3xl aspect-[4/5] shadow-2xl transition-all duration-500 hover:-translate-y-2">
      <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent z-10"></div>
      <img src="images/banners/casual_category.png" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" alt="Giày đi hằng ngày">
      <div class="absolute inset-0 flex flex-col justify-end p-8 z-20">
        <h3 class="text-3xl font-bold text-white mb-2">GIÀY CASUAL</h3>
        <p class="text-gray-200 opacity-0 group-hover:opacity-100 transition-opacity duration-300">Phong cách mỗi ngày</p>
      </div>
    </a>
  </div>

  <script>
    function toggleUserMenu() {
      const menu = document.getElementById("userMenu");
      menu.classList.toggle("hidden");
    }

    // click ra ngoài thì đóng
    document.addEventListener("click", function (event) {
      const menu = document.getElementById("userMenu");
      const icon = document.querySelector(".fa-user");

      if (menu && icon && !icon.contains(event.target) && !menu.contains(event.target)) {
        menu.classList.add("hidden");
      }
    });
  </script>
  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
</body>

</html>
