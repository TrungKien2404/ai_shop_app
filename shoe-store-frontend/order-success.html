<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh Toán Thành Công - Shoe Store</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">
  <div class="max-w-4xl mx-auto px-6 py-10">
    <div class="bg-white rounded-xl shadow-lg p-6 md:p-8 relative">
      <!-- Theme Toggle -->
      <div class="absolute top-6 right-6">
        <button onclick="toggleTheme()" class="cursor-pointer text-2xl hover:text-gray-300 transition focus:outline-none" title="Đổi giao diện">
          <i class="theme-icon fa-solid fa-moon"></i>
        </button>
      </div>

      <div class="text-center mb-6">
        <div class="text-5xl mb-2">✅</div>
        <h1 class="text-3xl font-bold text-green-700">Thanh toán thành công</h1>
        <p class="text-gray-600 mt-2">Cảm ơn bạn đã mua sắm tại MyShoes.</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm md:text-base">
        <p><span class="font-semibold">Mã đơn hàng:</span> <span id="orderCode">-</span></p>
        <p><span class="font-semibold">Thời gian:</span> <span id="createdAt">-</span></p>
        <p><span class="font-semibold">Người mua:</span> <span id="buyerName">-</span></p>
        <p><span class="font-semibold">Địa chỉ:</span> <span id="buyerAddress">-</span></p>
        <p><span class="font-semibold">Số điện thoại:</span> <span id="buyerPhone">-</span></p>
        <p><span class="font-semibold">Giao hàng:</span> <span id="shippingMethod">-</span></p>
        <p><span class="font-semibold">Thanh toán:</span> <span id="paymentMethod">-</span></p>
      </div>

      <div class="mt-6">
        <h2 class="text-xl font-bold mb-3">Chi tiết đơn hàng</h2>
        <div class="overflow-x-auto">
          <table class="w-full">
            <thead>
              <tr class="border-b">
                <th class="text-left py-2">Sản phẩm</th>
                <th class="text-center py-2">Số lượng</th>
                <th class="text-right py-2">Đơn giá</th>
                <th class="text-right py-2">Thành tiền</th>
              </tr>
            </thead>
            <tbody id="orderItemsBody"></tbody>
          </table>
        </div>
      </div>

      <div class="mt-5 text-right">
        <p class="text-xl font-bold">Tổng thanh toán: <span id="totalAmount" class="text-red-500">0đ</span></p>
      </div>

      <div class="mt-6 flex gap-3">
        <a href="home.html" class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition">Về trang chủ</a>
        <a href="cart.html" class="bg-gray-600 text-white px-5 py-2 rounded-lg hover:bg-gray-700 transition">Quay lại giỏ hàng</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>

  <script>
    function formatVnd(value) {
      return Number(value || 0).toLocaleString("vi-VN") + "đ";
    }

    const orderData = JSON.parse(sessionStorage.getItem("lastOrder") || "null");
    if (!orderData) {
      window.location.href = "cart.html";
    } else {
      document.getElementById("orderCode").textContent = orderData.orderCode || "-";
      document.getElementById("createdAt").textContent = orderData.createdAt
        ? new Date(orderData.createdAt).toLocaleString("vi-VN")
        : "-";
      document.getElementById("buyerName").textContent = orderData.buyerName || "-";
      document.getElementById("buyerAddress").textContent = orderData.buyerAddress || "-";
      document.getElementById("buyerPhone").textContent = orderData.buyerPhone || "-";
      document.getElementById("shippingMethod").textContent = orderData.shippingMethod || "-";
      document.getElementById("paymentMethod").textContent = orderData.paymentMethod || "-";

      const body = document.getElementById("orderItemsBody");
      (orderData.orderItems || []).forEach((item) => {
        const row = document.createElement("tr");
        row.className = "border-b";
        row.innerHTML = `
          <td class="py-2">
            <div>${item.name || ""}</div>
            <div class="text-sm text-gray-500">${item.size ? `Size: ${item.size}` : ""}</div>
          </td>
          <td class="text-center">${item.quantity || 1}</td>
          <td class="text-right">${formatVnd(item.price || 0)}</td>
          <td class="text-right font-semibold">${formatVnd((item.price || 0) * (item.quantity || 1))}</td>
        `;
        body.appendChild(row);
      });

      document.getElementById("totalAmount").textContent = formatVnd(orderData.totalPrice || 0);
    }
  </script>
  <script src="js/theme.js"></script>
</body>

</html>
