<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đặt Hàng - Shoe Store</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="js/constants.js"></script>
</head>


<body class="bg-gray-100 min-h-screen">
  <div class="custom-navbar p-4 flex justify-between items-center relative z-50 shadow-sm">

    <!-- Logo (Góc trái) -->
    <a href="home.html" class="flex items-center gap-2">
      <img id="siteLogo" src="images/logo/lightmode.png" alt="Logo" class="h-10 w-auto">
    </a>

    <!-- Menu (Ở giữa) -->
    <div class="flex items-center space-x-8">
      <a href="home.html" class="hover:text-gray-300 font-semibold text-lg transition">Home</a>

      <!-- Dropdown Sản phẩm -->
      <div class="relative group">
        <button
          class="flex items-center gap-1 hover:text-gray-300 font-semibold text-lg focus:outline-none py-2 transition">
          Sản phẩm <i class="fa-solid fa-chevron-down text-xs ml-1"></i>
        </button>

        <!-- Khung lựa chọn sản phẩm (Hover để hiện) -->
        <div
          class="absolute left-0 mt-0 w-48 bg-white text-black rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 border border-gray-100">
          <div class="py-2">
            <a href="nike.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-nike.png" alt="Nike" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Nike</span>
            </a>
            <a href="adidas.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-adidas.png" alt="Adidas" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Adidas</span>
            </a>
            <a href="puma.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-puma.png" alt="Puma" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Puma</span>
            </a>
            <a href="bitis.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-bitis.png" alt="Biti's" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Biti's</span>
            </a>
            <a href="mizuno.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
              <img src="images/logo-mizuno.png" alt="Mizuno" class="w-6 h-6 object-contain"
                onerror="this.style.display='none'">
              <span class="font-medium">Mizuno</span>
            </a>
          </div>
        </div>
      </div>

      <a href="sale.html" class="text-red-400 hover:text-red-300 font-bold text-lg transition">SALE</a>
    </div>

    <!-- Right side (Góc phải) -->
    <div class="flex items-center space-x-6">

      <!-- Thanh tìm kiếm -->
      <div
        class="flex items-center bg-white rounded-full px-4 py-1.5 shadow-sm border border-gray-300 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
        <input type="text" placeholder="Tìm kiếm..."
          class="bg-transparent text-black outline-none w-32 md:w-56 text-sm placeholder-gray-500">
        <button class="focus:outline-none"><i
            class="fa-solid fa-search text-gray-500 hover:text-blue-600 transition"></i></button>
      </div>

      <!-- Cart -->
      <div class="relative">
        <a href="cart.html" class="cursor-pointer text-2xl hover:opacity-80 transition">
          🛒
          <span
            class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full font-bold shadow">
            2
          </span>
        </a>
      </div>


      <!-- Theme Toggle -->
      <div class="relative">
        <button onclick="toggleTheme()"
          class="cursor-pointer text-2xl hover:text-gray-300 transition focus:outline-none" title="Đổi giao diện">
          <i class="theme-icon fa-solid fa-moon"></i>
        </button>
      </div>

      <!-- User Icon -->
      <div class="relative group/user">
        <div onclick="toggleUserMenu()" class="cursor-pointer hover:text-gray-300 transition">
          <i class="fa-solid fa-user text-2xl"></i>
        </div>

        <!-- Dropdown User -->
        <div id="userMenu"
          class="hidden absolute right-0 mt-3 w-36 bg-white text-black rounded-lg shadow-xl border border-gray-100 py-1">
          <a href="login.html" class="block px-4 py-2 hover:bg-gray-100 transition font-medium">Đăng nhập</a>
          <a href="signup.html" class="block px-4 py-2 hover:bg-gray-100 transition font-medium">Đăng ký</a>
        </div>
      </div>

    </div>

  </div>
  <main class="max-w-5xl mx-auto p-6">
    <div class="bg-white rounded-2xl shadow-md p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
      <div class="rounded-xl overflow-hidden bg-gray-100">
        <img id="productImage" src="images/Nike/vomero18.jpg" alt="Nike Vomero 18" class="product-image-container">
      </div>

      <div>
        <h1 id="productName" class="text-2xl md:text-3xl font-bold text-gray-900">Nike Vomero 18</h1>
        <p class="mt-3 text-2xl font-bold text-red-500" id="productPrice" data-price="4190000">4.190.000đ</p>
        <p class="mt-3 text-sm text-gray-500">Giày chạy bộ cao cấp, êm ái và bám đường tốt.</p>

        <section class="mt-6">
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold">Chọn size</h2>
            <a href="size-guide.html" target="_blank" class="text-black-600 text-xs hover:underline italic">
              <i class="fa-solid fa-ruler-horizontal mr-1"></i>Hướng dẫn chọn size
            </a>
          </div>
          <div class="flex flex-wrap gap-2" id="sizeGroup">
            <button type="button" class="size-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-blue-600"
              data-size="38">38</button>
            <button type="button" class="size-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-blue-600"
              data-size="39">39</button>
            <button type="button" class="size-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-blue-600"
              data-size="40">40</button>
            <button type="button" class="size-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-blue-600"
              data-size="41">41</button>
            <button type="button" class="size-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-blue-600"
              data-size="42">42</button>
            <button type="button" class="size-btn px-4 py-2 rounded-lg border border-gray-300 hover:border-blue-600"
              data-size="43">43</button>
          </div>
        </section>

        <section class="mt-6">
          <h2 class="font-semibold mb-3">Số lượng</h2>
          <div class="inline-flex items-center border rounded-lg overflow-hidden">
            <button id="decreaseBtn" type="button" class="px-4 py-2 bg-gray-100 hover:bg-gray-200">-</button>
            <input id="quantityInput" type="number" min="1" value="1" class="w-16 text-center outline-none py-2">
            <button id="increaseBtn" type="button" class="px-4 py-2 bg-gray-100 hover:bg-gray-200">+</button>
          </div>
        </section>

        <section class="mt-6 bg-gray-50 rounded-xl p-4">
          <p class="text-gray-700">Tạm tính:</p>
          <p id="subtotal" class="text-2xl font-bold text-blue-700 mt-1">4.190.000đ</p>
        </section>

        <div class="mt-6 flex flex-wrap gap-3">
          <button id="addToCartBtn" type="button"
            class="px-5 py-3 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700">
            Thêm vào giỏ hàng
          </button>
          <button id="buyNowBtn" type="button"
            class="px-5 py-3 rounded-lg bg-green-600 text-white font-medium hover:bg-green-700">
            Mua hàng ngay
          </button>
        </div>

        <a href="home.html" class="inline-block mt-5 text-sm text-gray-500 hover:text-gray-700">← Quay lại trang chủ</a>
      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>

  <script>
    function toggleUserMenu() {
      const menu = document.getElementById("userMenu");
      menu.classList.toggle("hidden");
    }



    const priceEl = document.getElementById("productPrice");
    const quantityInput = document.getElementById("quantityInput");
    const subtotalEl = document.getElementById("subtotal");
    const sizeButtons = document.querySelectorAll(".size-btn");
    const productNameEl = document.getElementById("productName");
    const productImageEl = document.getElementById("productImage");
    const buyNowBtn = document.getElementById("buyNowBtn");
    let selectedSize = null;

    buyNowBtn.textContent = "Thanh toán ngay";

    function formatVnd(value) {
      return Number(value).toLocaleString("vi-VN") + "đ";
    }

    function updateSubtotal() {
      const unitPrice = Number(priceEl.dataset.price || 0);
      const quantityRaw = Number(quantityInput.value);
      const quantity = Number.isFinite(quantityRaw) && quantityRaw > 0 ? quantityRaw : 0;
      subtotalEl.textContent = formatVnd(unitPrice * quantity);
    }

    function normalizeQuantityToMinOne() {
      const parsed = Math.floor(Number(quantityInput.value));
      quantityInput.value = Number.isFinite(parsed) && parsed > 0 ? parsed : 1;
      updateSubtotal();
    }

    function setActiveSize(button) {
      sizeButtons.forEach((btn) => {
        btn.classList.remove("bg-blue-600", "text-white", "border-blue-600");
        btn.classList.add("border-gray-300");
      });
      button.classList.remove("border-gray-300");
      button.classList.add("bg-blue-600", "text-white", "border-blue-600");
      selectedSize = button.dataset.size;
    }

    function getSelectedOrderData() {
      const quantity = Math.max(1, Math.floor(Number(quantityInput.value) || 1));
      return {
        name: productNameEl.textContent.trim(),
        image: productImageEl.getAttribute("src"),
        price: Number(priceEl.dataset.price || 0),
        quantity,
        size: selectedSize
      };
    }

    function addCurrentItemToCart() {
      if (!window.authUtils?.requireLogin?.("Xin vui lòng đăng nhập trước khi thêm sản phẩm vào giỏ hàng.")) {
        return false;
      }

      const item = getSelectedOrderData();
      if (!item.size) {
        alert("Vui lòng chọn size trước khi thêm vào giỏ hàng.");
        return false;
      }

      const currentCart = window.cartUtils?.getCartItems?.() || [];
      window.cartUtils?.saveCartItems?.([...currentCart, item]);
      window.cartUtils?.updateCartBadge?.();
      return true;
    }

    function goToCheckoutWithCurrentItem() {
      if (!window.authUtils?.requireLogin?.("Xin vui lòng đăng nhập trước khi thanh toán.")) {
        return;
      }

      const item = getSelectedOrderData();
      if (!item.size) {
        alert("Vui lòng chọn size trước khi thanh toán.");
        return;
      }

      const totalAmount = item.price * item.quantity;
      sessionStorage.setItem("checkoutCartItems", JSON.stringify([
        {
          ...item,
          total: totalAmount
        }
      ]));
      sessionStorage.setItem("checkoutTotalAmount", String(totalAmount));
      window.location.href = "checkout.html";
    }

    document.getElementById("decreaseBtn").addEventListener("click", () => {
      quantityInput.value = Math.max(1, Math.floor(Number(quantityInput.value) || 1) - 1);
      updateSubtotal();
    });

    document.getElementById("increaseBtn").addEventListener("click", () => {
      quantityInput.value = Math.max(1, Math.floor(Number(quantityInput.value) || 1) + 1);
      updateSubtotal();
    });

    // Tính realtime theo từng ký tự nhập
    quantityInput.addEventListener("input", updateSubtotal);
    quantityInput.addEventListener("blur", normalizeQuantityToMinOne);
    quantityInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        normalizeQuantityToMinOne();
      }
    });

    sizeButtons.forEach((btn) => {
      btn.addEventListener("click", () => setActiveSize(btn));
    });

    document.getElementById("addToCartBtn").addEventListener("click", () => {
      const ok = addCurrentItemToCart();
      if (ok) {
        alert("Đã thêm sản phẩm vào giỏ hàng.");
      }
    });

    buyNowBtn.addEventListener("click", () => {
      goToCheckoutWithCurrentItem();
    });

    // Hỗ trợ truyền thông tin nhanh qua URL: order.html?name=...&price=4190000&image=...
    const query = new URLSearchParams(window.location.search);
    const qName = query.get("name");
    const qPrice = query.get("price");
    const qImage = query.get("image");

    if (qName) productNameEl.textContent = qName;
    if (qPrice && !Number.isNaN(Number(qPrice))) {
      priceEl.dataset.price = String(Number(qPrice));
      priceEl.textContent = formatVnd(Number(qPrice));
    }
    if (qImage) {
      productImageEl.src = qImage;
      productImageEl.alt = qName || productImageEl.alt;
    }

    updateSubtotal();
  </script>
  <script src="js/theme.js"></script>
</body>

</html>
