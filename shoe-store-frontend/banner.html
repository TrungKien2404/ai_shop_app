<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <title>Sản Phẩm Độc Quyền - Shoe Store</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">
  <!-- Navbar (Shared from home.html style) -->
  <div class="custom-navbar p-4 flex justify-between items-center relative z-50 shadow-sm">
    <a href="home.html" class="flex items-center gap-2">
      <img id="siteLogo" src="images/logo/lightmode.png" alt="Logo" class="h-10 w-auto">
    </a>

    <div class="flex items-center space-x-8">
      <a href="home.html" class="hover:text-gray-300 font-semibold text-lg transition">Home</a>
      <div class="relative group">
        <button class="flex items-center gap-1 hover:text-gray-300 font-semibold text-lg py-2">Sản phẩm <i class="fa-solid fa-chevron-down text-xs ml-1"></i></button>
        <div class="absolute left-0 mt-0 w-48 bg-white text-black rounded-lg shadow-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all border border-gray-100">
          <div class="py-2">
            <a href="nike.html" class="block px-4 py-2 hover:bg-gray-100">Nike</a>
            <a href="adidas.html" class="block px-4 py-2 hover:bg-gray-100">Adidas</a>
            <a href="puma.html" class="block px-4 py-2 hover:bg-gray-100">Puma</a>
            <a href="bitis.html" class="block px-4 py-2 hover:bg-gray-100">Biti's</a>
            <a href="mizuno.html" class="block px-4 py-2 hover:bg-gray-100">Mizuno</a>
          </div>
        </div>
      </div>
      <a href="sale.html" class="text-red-400 font-bold text-lg">SALE</a>
    </div>

    <div class="flex items-center space-x-6">
      <div class="relative"><a href="cart.html" class="text-2xl">🛒</a></div>
      <button onclick="toggleTheme()" class="text-2xl"><i class="theme-icon fa-solid fa-moon"></i></button>
      <div class="relative group/user">
        <div onclick="toggleUserMenu()" class="cursor-pointer hover:text-gray-300 transition"><i class="fa-solid fa-user text-2xl"></i></div>
        <div id="userMenu" class="hidden absolute right-0 mt-3 w-36 bg-white text-black rounded-lg shadow-xl border border-gray-100 py-1">
          <a href="login.html" class="block px-4 py-2 hover:bg-gray-100 transition font-medium">Đăng nhập</a>
          <a href="signup.html" class="block px-4 py-2 hover:bg-gray-100 transition font-medium">Đăng ký</a>
        </div>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto px-6 py-12">
    <div class="flex flex-col items-center mb-12 text-center">
      <h1 class="text-4xl font-black text-gray-900 uppercase tracking-widest mb-4 italic">Sản Phẩm Độc Quyền</h1>
      <div class="h-1.5 w-32 bg-blue-600 mb-6 rounded-full"></div>
      <p class="text-gray-600 text-lg max-w-2xl">Khám phá những mẫu giày phiên bản giới hạn, thiết kế tinh xảo và đẳng cấp duy nhất chỉ có tại hệ thống của chúng tôi.</p>
    </div>

    <!-- Product Grid -->
    <div id="exclusiveGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
      <div class="col-span-full text-center py-20 text-gray-500 italic">
        <i class="fas fa-spinner fa-spin mr-2"></i> Đang tải bộ sưu tập độc quyền...
      </div>
    </div>

    <!-- Pagination -->
    <div id="pagination" class="pagination mt-16"></div>
  </div>

  <script src="js/auth.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/products.js"></script>
  <script>
    function toggleUserMenu() {
      const menu = document.getElementById('userMenu');
      if (menu) menu.classList.toggle('hidden');
    }
  </script>
</body>
</html>
