<html lang="vi">

<head>
    <meta charset="UTF-8">
    <title>Trang Cá Nhân - Shoe Store</title>
    <link rel="stylesheet" href="styles.css">

<body class="bg-gray-100 pb-10">

                    <div class="py-2">
                        <a href="nike.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">

                        <a href="adidas.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">

                            <span class="font-medium">Adidas</span>
                        </a>
                        <a href="puma.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">
                            <img src="images/logo-puma.png" alt="Puma" class="w-6 h-6 object-contain"
                                onerror="this.style.display='none'">
                            <span class="font-medium">Puma</span>
                        </a>
                        <a href="bitis.html" class="flex items-center gap-3 px-4 py-2 hover:bg-gray-100 transition">

                                onerror="this.style.display='none'">

            </div>

            <a href="sale.html" class="text-red-400 hover:text-red-300 font-bold text-lg transition">SALE</a>
        </div>

        <!-- Right side (Góc phải) -->
        <div class="flex items-center space-x-6">

            <!-- Thanh tìm kiếm -->
            <div
                class="flex items-center bg-white rounded-full px-4 py-1.5 shadow-sm border border-gray-300 focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500 transition-all">
                <input type="text" placeholder="Tìm kiếm..."
                    class="bg-transparent text-black outline-none w-32 md:w-56 text-sm placeholder-gray-500">
                <button class="focus:outline-none"><i
                        class="fa-solid fa-search text-gray-500 hover:text-blue-600 transition"></i></button>

            <!-- Cart -->

                <a href="cart.html" class="cursor-pointer text-2xl hover:opacity-80 transition">

                    <span
                        class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-1.5 py-0.5 rounded-full font-bold shadow">
                        2

            <!-- Theme Toggle -->
            <div class="relative">
                <button onclick="toggleTheme()"
                    class="cursor-pointer text-2xl hover:text-gray-300 transition focus:outline-none"
                    title="Đổi giao diện">
                    <i class="theme-icon fa-solid fa-moon"></i>
                </button>
            </div>

            <!-- User Icon -->
            <div class="relative group/user">
                <div onclick="toggleUserMenu()" class="cursor-pointer hover:text-gray-300 transition">
                    <i class="fa-solid fa-user text-2xl"></i>
                </div>

                <!-- Dropdown User -->
                <div id="userMenu"
                    class="hidden absolute right-0 mt-3 w-36 bg-white text-black rounded-lg shadow-xl border border-gray-100 py-1">
                    <a href="login.html" class="block px-4 py-2 hover:bg-gray-100 transition font-medium">Đăng nhập</a>
                    <a href="signup.html" class="block px-4 py-2 hover:bg-gray-100 transition font-medium">Đăng ký</a>
                </div>
            </div>

        </div>

    </div>

    <h2 id="profileName" class="text-2xl font-bold text-gray-800 text-center">Đang tải...</h2>
    <p id="profileEmail" class="text-gray-500 text-sm mt-1 text-center">Đang tải...</p>
    </div>

    <nav class="p-4 space-y-2">
        <button onclick="showSection('info')" id="nav-info"
            class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left transition-colors font-medium bg-blue-600 text-white shadow-md profile-nav">
            <i class="fa-solid fa-address-card w-5 text-center"></i>
            <span>Thông tin tài khoản</span>
        </button>
        <button onclick="showSection('history')" id="nav-history"
            class="w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-left transition-colors font-medium text-gray-700 hover:bg-gray-100 profile-nav">
            <i class="fa-solid fa-box-open w-5 text-center"></i>
            <span>Lịch sử mua hàng</span>
        </button>
    </nav>
    </div>

    <!-- Main Content -->
    <div class="md:w-2/3 p-8">

        <!-- Thông tin tài khoản section -->
        <div id="infoSection" class="transition-opacity duration-300">
            <div class="flex items-center justify-between mb-8 pb-4 border-b border-gray-200">
                <h3 class="text-2xl font-bold text-gray-800">Hồ sơ của tôi</h3>
                <span
                    class="bg-green-100 text-green-800 text-xs font-semibold px-2.5 py-0.5 rounded border border-green-200">Hoạt
                    động</span>
            </div>

            <form id="profileForm" class="space-y-6 max-w-lg">
                <div class="space-y-1">
                    <label class="block text-white-700 font-semibold text-sm">Họ và Tên</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-white-400">
                            <i class="fa-regular fa-user"></i>
                        </span>
                        <input type="text" id="inputName"
                            class="w-full pl-10 pr-4 py-2 border border-white-300 rounded-lg bg-gray-50 text-white-800 disabled cursor-not-allowed"
                            readonly>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-white-700 font-semibold text-sm">Tên tài khoản (Email)</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-white-400">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="email" id="inputEmail"
                            class="w-full pl-10 pr-4 py-2 border border-white-300 rounded-lg bg-gray-50 text-white-800 disabled cursor-not-allowed"
                            readonly>
                    </div>
                </div>

                <div class="space-y-1">
                    <label class="block text-white-700 font-semibold text-sm">Mật khẩu</label>
                    <div class="flex shadow-sm rounded-lg">
                        <div class="relative flex-grow">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-white-400">
                                <i class="fa-solid fa-lock"></i>
                            </span>
                            <input type="password" id="inputPassword" value="********"
                                class="w-full pl-10 pr-4 py-2 border border-white-300 rounded-l-lg bg-gray-50 text-white-800"
                                readonly>
                        </div>
                        <button type="button"
                            class="bg-gray-100 text-white-700 px-4 py-2 border border-gray-300 border-l-0 rounded-r-lg hover:bg-gray-200 transition-colors font-medium text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:z-10"
                            onclick="alert('Chức năng đổi mật khẩu đang được phát triển')">Đổi</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- Lịch sử mua hàng section -->
        <div id="historySection" class="hidden transition-opacity duration-300">
            <h3 class="text-2xl font-bold text-white-800 mb-8 pb-4 border-b border-gray-200">Lịch sử đơn hàng</h3>

            <div class="bg-white border rounded-xl overflow-hidden shadow-sm">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse min-w-full">
                        <thead>
                            <tr
                                class="bg-gray-50 border-b border-gray-200 text-xs uppercase tracking-wider text-gray-500 font-semibold">
                                <th class="p-4">Mã ĐH</th>
                                <th class="p-4">Ngày mua</th>
                                <th class="p-4">Sản phẩm</th>
                                <th class="p-4">Tổng tiền</th>
                                <th class="p-4">Trạng thái</th>
                            </tr>
                        </thead>
                        <tbody id="orderHistoryBody" class="divide-y divide-gray-100">
                            <!-- Dữ liệu sẽ được load từ API -->
                            <tr>
                                <td colspan="5" class="p-8 text-center text-gray-400">
                                    <i class="fas fa-spinner fa-spin mr-2"></i>Đang tải lịch sử đơn hàng...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination for orders -->
                <div id="orderPaginationInfo" class="bg-gray-50 px-4 py-3 border-t border-gray-200 sm:px-6">
                    <p class="text-sm text-gray-500 text-center">Đang tải...</p>
                </div>
            </div>
        </div>

    </div>
    </div>
    </div>
    </div>

    <script src="js/auth.js"></script>
    <script>

        function toggleUserMenu() {
            const menu = document.getElementById("userMenu");
            menu.classList.toggle("hidden");
        }

        document.addEventListener("click", function (event) {
            const menu = document.getElementById("userMenu");
            const icon = document.querySelector(".fa-user");
            if (icon && menu && !icon.contains(event.target) && !menu.contains(event.target)) {
                menu.classList.add("hidden");
            }
        });

        function showSection(sectionId) {
            // Hide all sections
            document.getElementById('infoSection').classList.add('hidden');
            document.getElementById('historySection').classList.add('hidden');

            // Reset navigation styles
            document.querySelectorAll('.profile-nav').forEach(el => {
                el.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                el.classList.add('text-gray-700', 'hover:bg-gray-100');
            });

            // Show target section
            const targetSection = document.getElementById(sectionId + 'Section');
            targetSection.classList.remove('hidden');

            // Add minimal animation effect
            targetSection.classList.add('opacity-0');
            setTimeout(() => {
                targetSection.classList.remove('opacity-0');
            }, 10);

            // Update active navigation style
            const activeNav = document.getElementById('nav-' + sectionId);
            activeNav.classList.remove('text-gray-700', 'hover:bg-gray-100');
            activeNav.classList.add('bg-blue-600', 'text-white', 'shadow-md');

            // Load order history khi chuyển sang tab lịch sử
            if (sectionId === 'history') {
                loadOrderHistory();
            }
        }

        function setChangePasswordMessage(message, type = 'error') {
            const messageEl = document.getElementById('changePasswordMessage');
            if (!messageEl) return;

            messageEl.textContent = message;
            messageEl.classList.remove('hidden', 'text-red-600', 'text-green-600');
            messageEl.classList.add(type === 'success' ? 'text-green-600' : 'text-red-600');
        }

        function clearChangePasswordForm() {
            const currentPassword = document.getElementById('currentPassword');
            const newPassword = document.getElementById('newPassword');
            const confirmNewPassword = document.getElementById('confirmNewPassword');
            const messageEl = document.getElementById('changePasswordMessage');
            const submitBtn = document.getElementById('submitChangePasswordBtn');

            if (currentPassword) currentPassword.value = '';
            if (newPassword) newPassword.value = '';
            if (confirmNewPassword) confirmNewPassword.value = '';
            if (messageEl) {
                messageEl.textContent = '';
                messageEl.classList.add('hidden');
            }
            if (submitBtn) {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Cập nhật mật khẩu';
            }
        }

        function toggleChangePasswordForm(forceState) {
            const wrap = document.getElementById('changePasswordFormWrap');
            if (!wrap) return;

            const shouldShow = typeof forceState === 'boolean' ? forceState : wrap.classList.contains('hidden');
            wrap.classList.toggle('hidden', !shouldShow);

            if (!shouldShow) {
                clearChangePasswordForm();
            }
        }

        async function handleChangePassword() {
            const token = getToken();
            if (!token) {
                alert('Vui lòng đăng nhập lại để đổi mật khẩu.');
                window.location.href = 'login.html';
                return;
            }

            const currentPassword = document.getElementById('currentPassword')?.value.trim();
            const newPassword = document.getElementById('newPassword')?.value.trim();
            const confirmPassword = document.getElementById('confirmNewPassword')?.value.trim();
            const submitBtn = document.getElementById('submitChangePasswordBtn');

            if (!currentPassword || !newPassword || !confirmPassword) {
                setChangePasswordMessage('Vui lòng nhập đầy đủ thông tin.');
                return;
            }

            if (newPassword.length < 6) {
                setChangePasswordMessage('Mật khẩu mới phải có ít nhất 6 ký tự.');
                return;
            }

            if (newPassword !== confirmPassword) {
                setChangePasswordMessage('Mật khẩu mới và xác nhận mật khẩu chưa khớp.');
                return;
            }

            if (currentPassword === newPassword) {
                setChangePasswordMessage('Mật khẩu mới phải khác mật khẩu hiện tại.');
                return;
            }

            try {
                if (submitBtn) {
                    submitBtn.disabled = true;
                    submitBtn.textContent = 'Đang cập nhật...';
                }

                const response = await fetch(`${API_BASE}/auth/change-password`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        currentPassword,
                        newPassword,
                        confirmPassword
                    })
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.message || 'Không đổi được mật khẩu');
                }

                setChangePasswordMessage('Đổi mật khẩu thành công.', 'success');
                setTimeout(() => {
                    toggleChangePasswordForm(false);
                }, 1200);
            } catch (error) {
                setChangePasswordMessage(error.message || 'Đổi mật khẩu thất bại.');
                if (submitBtn) {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Cập nhật mật khẩu';
                }
            }
        }

        function initializeChangePasswordSection() {
            const passwordInput = document.getElementById('inputPassword');
            if (!passwordInput) return;

            const passwordWrapper = passwordInput.closest('.space-y-1');
            if (!passwordWrapper) return;

            const passwordButton = passwordWrapper.querySelector('button[type="button"]');
            if (passwordButton) {
                passwordButton.onclick = () => toggleChangePasswordForm();
            }

            if (!document.getElementById('changePasswordFormWrap')) {
                passwordWrapper.insertAdjacentHTML('afterend', `
                    <div id="changePasswordFormWrap" class="hidden space-y-4 rounded-xl border border-gray-200 bg-gray-50 p-4">
                        <div>
                            <label for="currentPassword" class="block text-sm font-semibold mb-2">Mật khẩu hiện tại</label>
                            <input type="password" id="currentPassword"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="Nhập mật khẩu hiện tại">
                        </div>
                        <div>
                            <label for="newPassword" class="block text-sm font-semibold mb-2">Mật khẩu mới</label>
                            <input type="password" id="newPassword"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="Nhập mật khẩu mới">
                        </div>
                        <div>
                            <label for="confirmNewPassword" class="block text-sm font-semibold mb-2">Xác nhận mật khẩu mới</label>
                            <input type="password" id="confirmNewPassword"
                                class="w-full px-4 py-2 border border-gray-300 rounded-lg outline-none focus:ring-2 focus:ring-blue-600"
                                placeholder="Nhập lại mật khẩu mới">
                        </div>
                        <p id="changePasswordMessage" class="hidden text-sm"></p>
                        <div class="flex flex-wrap gap-3">
                            <button type="button" id="submitChangePasswordBtn"
                                class="bg-blue-600 text-white px-5 py-2 rounded-lg hover:bg-blue-700 transition-colors font-medium">
                                Cập nhật mật khẩu
                            </button>
                            <button type="button"
                                class="bg-gray-200 text-gray-700 px-5 py-2 rounded-lg hover:bg-gray-300 transition-colors font-medium"
                                onclick="toggleChangePasswordForm(false)">
                                Hủy
                            </button>
                        </div>
                    </div>
                `);
            }

            document.getElementById('submitChangePasswordBtn')?.addEventListener('click', handleChangePassword);
        }

        // Load user data on page load
        document.addEventListener('DOMContentLoaded', () => {
            if (!isLoggedIn()) {
                alert('Vui lòng đăng nhập để xem trang cá nhân.');
                window.location.href = 'login.html';
                return;
            }

            const user = getUser();
            if (user) {
                document.getElementById('profileName').textContent = user.name || user.fullname || 'Người dùng';
                document.getElementById('profileEmail').textContent = user.email || '';

                document.getElementById('inputName').value = user.name || user.fullname || '';
                document.getElementById('inputEmail').value = user.email || '';
            }

            updateUserMenu();
            initializeChangePasswordSection();
            loadOrderHistory();
        });

        async function loadOrderHistory() {
            const user = getUser();
            if (!user) return;

            const userId = user._id || user.id;
            const tbody = document.getElementById('orderHistoryBody');
            const paginationInfo = document.getElementById('orderPaginationInfo');

            try {
                const response = await fetch(`${API_BASE}/orders/myorders/${userId}`);
                if (!response.ok) throw new Error("Không lấy được đơn hàng");

                const orders = await response.json();

                if (orders.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5" class="p-8 text-center text-gray-400">
                                <i class="fa-solid fa-box-open text-3xl mb-2 block"></i>
                                Bạn chưa có đơn hàng nào.
                            </td>
                        </tr>`;
                    paginationInfo.innerHTML = `<p class="text-sm text-gray-500 text-center">Chưa có đơn hàng</p>`;
                    return;
                }

                let html = '';
                orders.forEach(order => {
                    const date = new Date(order.createdAt);
                    const dateStr = date.toLocaleDateString('vi-VN');
                    const firstItem = order.orderItems && order.orderItems[0];
                    const itemName = (firstItem && firstItem.name) ? firstItem.name : 'Sản phẩm';
                    const itemImage = firstItem ? firstItem.image : null;
                    const totalFmt = Number(order.totalPrice || 0).toLocaleString('vi-VN') + 'đ';

                    // Trạng thái badge
                    let statusBadge = '';
                    const status = order.status || 'Chờ xử lý';
                    if (status === 'Hoàn thành' || status === 'Completed' || status === 'Đã giao') {
                        statusBadge = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-green-100 text-green-800 border border-green-200">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5"></span>${status === 'Completed' ? 'Hoàn thành' : status}
                        </span>`;
                    } else if (status === 'Đã hủy' || status === 'Cancelled' || status === 'Đã huỷ') {
                        statusBadge = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-red-100 text-red-800 border border-red-200">
                            <span class="w-1.5 h-1.5 bg-red-500 rounded-full mr-1.5"></span>${status === 'Cancelled' ? 'Đã hủy' : status}
                        </span>`;
                    } else if (status === 'Chờ xử lý' || status === 'Pending') {
                        statusBadge = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800 border border-yellow-200">
                            <i class="fa-solid fa-clock mr-1.5 text-[10px]"></i>Chờ xử lý
                        </span>`;
                    } else {
                        statusBadge = `<span class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800 border border-blue-200">
                            <i class="fa-solid fa-truck-fast mr-1.5 text-[10px]"></i>${status}
                        </span>`;
                    }

                    // Ảnh sản phẩm
                    const imgHtml = itemImage
                        ? `<img src="${itemImage}" alt="Shoe" class="h-full object-cover" onerror="this.src='https://via.placeholder.com/40'; this.onerror=null;">`
                        : `<i class="fa-solid fa-box text-gray-400"></i>`;

                    html += `
                    <tr class="hover:bg-gray-50 transition-colors group">
                        <td class="p-4">
                            <span class="text-blue-600 font-bold group-hover:text-blue-800 transition-colors">#${order.orderCode || 'N/A'}</span>
                        </td>
                        <td class="p-4 text-sm text-gray-600">
                            <div class="flex items-center space-x-1">
                                <i class="fa-regular fa-calendar-days text-gray-400"></i>
                                <span>${dateStr}</span>
                            </div>
                        </td>
                        <td class="p-4">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded bg-gray-100 flex items-center justify-center overflow-hidden border flex-shrink-0">
                                    ${imgHtml}
                                </div>
                                <span class="text-sm font-medium text-gray-800 line-clamp-2">${itemName.length > 25 ? itemName.substring(0, 25) + '...' : itemName}</span>
                            </div>
                        </td>
                        <td class="p-4">
                            <span class="font-bold text-red-600">${totalFmt}</span>
                        </td>
                        <td class="p-4">
                            ${statusBadge}
                        </td>
                    </tr>`;
                });

                tbody.innerHTML = html;
                paginationInfo.innerHTML = `<p class="text-sm text-gray-700 text-center">Hiển thị <span class="font-medium">${orders.length}</span> đơn hàng</p>`;

            } catch (error) {
                console.error('Lỗi tải đơn hàng:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5" class="p-8 text-center text-red-400">
